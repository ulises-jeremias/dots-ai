name: Release AI Assets

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y zip unzip

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Apply chezmoi to process templates
        run: |
          "$HOME/.local/bin/chezmoi" init --source=. --promptDefaults
          # Apply for real so .tmpl files get rendered (e.g. SKILL.md.tmpl → SKILL.md)
          "$HOME/.local/bin/chezmoi" --source=. apply --force
          echo "=== chezmoi apply complete — deployed files ==="
          ls "$HOME/.local/share/dots-ai/skills/" | head -20

      - name: Verify target state (dump smoke)
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: bash scripts/verify-release-dump.sh

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts from manifest
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          export CHEZMOI_BIN="${HOME}/.local/bin/chezmoi"
          mkdir -p dist
          python3 scripts/build-release-artifacts.py

      - name: Build install-skills.sh (pin version)
        run: |
          version="${{ steps.version.outputs.version }}"
          cp scripts/install-skills.sh dist/install-skills.sh
          sed -i \
            "s|RELEASE_BASE=\"https://github.com/\${GITHUB_REPO}/releases/latest/download\"|RELEASE_BASE=\"https://github.com/ulises-jeremias/dots-ai/releases/download/${version}\"|" \
            dist/install-skills.sh
          chmod +x dist/install-skills.sh
          bash -n dist/install-skills.sh
          echo "=== Built install-skills.sh (version: ${version}) ==="
          head -5 dist/install-skills.sh

      - name: Build install-skills.ps1 (pin version)
        run: |
          version="${{ steps.version.outputs.version }}"
          cp scripts/install-skills.ps1 dist/install-skills.ps1
          sed -i \
            "s|ReleaseBase = \"https://github.com/\$GithubRepo/releases/latest/download\"|ReleaseBase = \"https://github.com/ulises-jeremias/dots-ai/releases/download/${version}\"|" \
            dist/install-skills.ps1
          echo "=== Built install-skills.ps1 (version: ${version}) ==="
          head -5 dist/install-skills.ps1

      - name: Append installers to upload list
        run: |
          echo "dist/install-skills.sh" >> dist/.release-upload-files.txt
          echo "dist/install-skills.ps1" >> dist/.release-upload-files.txt
          echo "=== Upload list ==="
          cat dist/.release-upload-files.txt

      - name: Generate release notes
        run: |
          version="${{ steps.version.outputs.version }}"
          SKILLS=$(ls home/dot_local/share/dots-ai/skills/ | sed 's/^/- /')

          cat > dist/RELEASE_NOTES.md << NOTES
          ## dots-ai AI Assets ${version}

          Pre-built AI skills, agents, and tools for the dots-ai users.
          Install on any machine — no chezmoi required.

          **Non-developers:** follow the step-by-step guide at
          [\`docs/wiki/GUIDED_AI_INSTALL.md\`](https://github.com/ulises-jeremias/dots-ai/blob/${version}/docs/wiki/GUIDED_AI_INSTALL.md).

          ### Included Skills

          ${SKILLS}

          ---

          ### Quick Install (Linux / macOS / WSL2)

          Install everything:
          \`\`\`bash
          curl -fsSL https://github.com/ulises-jeremias/dots-ai/releases/download/${version}/install-skills.sh | sh
          \`\`\`

          Install for a specific tool:
          \`\`\`bash
          # Claude Code / Claude Desktop
          curl -fsSL https://github.com/ulises-jeremias/dots-ai/releases/download/${version}/install-skills.sh | sh -s -- --tool claude

          # OpenCode
          curl -fsSL https://github.com/ulises-jeremias/dots-ai/releases/download/${version}/install-skills.sh | sh -s -- --tool opencode

          # Cursor
          curl -fsSL https://github.com/ulises-jeremias/dots-ai/releases/download/${version}/install-skills.sh | sh -s -- --tool cursor

          # Windsurf
          curl -fsSL https://github.com/ulises-jeremias/dots-ai/releases/download/${version}/install-skills.sh | sh -s -- --tool windsurf

          # GitHub Copilot (VS Code / custom instructions file)
          curl -fsSL https://github.com/ulises-jeremias/dots-ai/releases/download/${version}/install-skills.sh | sh -s -- --tool copilot
          \`\`\`

          ### Quick Install (Windows — PowerShell)

          \`\`\`powershell
          irm https://github.com/ulises-jeremias/dots-ai/releases/download/${version}/install-skills.ps1 | iex
          \`\`\`

          ---

          ### Manual Installation

          #### Claude Desktop (macOS / Linux / Windows)

          Extract \`dots-ai-agents-claude-${version}.zip\` and copy:
          - \`dot_claude/agents/\` → \`~/.claude/agents/\` (macOS/Linux)
          - \`dot_claude/agents/\` → \`%USERPROFILE%\\.claude\\agents\\\` (Windows)

          #### OpenCode

          Extract \`dots-ai-agents-opencode-${version}.zip\` and copy:
          - \`dot_config/opencode/agents/\` → \`~/.config/opencode/agents/\`
          - \`dot_config/opencode/skills/\` → \`~/.config/opencode/skills/\`

          #### Cursor

          Extract \`dots-ai-agents-cursor-${version}.zip\` and copy:
          - \`dot_cursor/rules/\` → \`~/.cursor/rules/\`
          - \`dot_cursor/skills/\` → \`~/.cursor/skills/\`

          #### Windsurf

          Extract \`dots-ai-agents-windsurf-${version}.zip\` and copy:
          - \`dot_windsurf/rules/\` → \`~/.windsurf/rules/\`

          #### GitHub Copilot

          Extract \`dots-ai-agents-copilot-${version}.zip\` and copy:
          - \`dot_github/copilot-instructions.md\` → \`~/.github/copilot-instructions.md\` (macOS/Linux)
          - \`dot_github/copilot-instructions.md\` → \`%USERPROFILE%\\.github\\copilot-instructions.md\` (Windows)

          #### Skills only (any tool)

          Extract \`dots-ai-skills-${version}.zip\` and copy the \`skills/\` directory:
          - macOS/Linux: \`~/.local/share/dots-ai/skills/\`
          - Windows: \`%USERPROFILE%\\.local\\share\\dots-ai\\skills\\\`

          ---

          ### Full Workstation Setup

          For a complete dots-ai workstation setup (toolchain + AI agents):

          \`\`\`bash
          # macOS / Linux / WSL2
          bash <(curl -fsSL https://raw.githubusercontent.com/ulises-jeremias/dots-ai/main/install.sh)
          \`\`\`

          \`\`\`powershell
          # Windows (auto-detects WSL2)
          irm https://raw.githubusercontent.com/ulises-jeremias/dots-ai/main/install.ps1 | iex
          \`\`\`

          ---

          ### How these artifacts are built

          Bundles are produced from the chezmoi **target state** after \`apply\`, driven by \`scripts/release-artifacts.json\` and \`scripts/build-release-artifacts.py\` (\`chezmoi archive\` / \`tar\`). See \`docs/wiki/RELEASES.md\`.
          NOTES

          echo "=== Generated RELEASE_NOTES.md ==="
          wc -l dist/RELEASE_NOTES.md

      - name: Verify all dist artifacts exist
        run: |
          version="${{ steps.version.outputs.version }}"
          failed=0
          while IFS= read -r f; do
            [[ -z "$f" ]] && continue
            if [ -f "$f" ]; then
              echo "PASS: $f ($(du -h "$f" | cut -f1))"
            else
              echo "FAIL: missing $f"
              failed=1
            fi
          done < dist/.release-upload-files.txt
          for f in "dist/RELEASE_NOTES.md"; do
            if [ -f "$f" ]; then
              echo "PASS: $f"
            else
              echo "FAIL: missing $f"
              failed=1
            fi
          done
          [ "$failed" -eq 0 ] || exit 1
          echo "=== All artifacts verified ==="

      - name: Prepare files list for gh-release
        id: upload
        run: |
          # Comma-separated (single-line) — reliable for GITHUB_OUTPUT
          files_csv="$(paste -sd, dist/.release-upload-files.txt)"
          echo "release_files=${files_csv}" >> "$GITHUB_OUTPUT"
          echo "Uploading: ${files_csv}"

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v3
        with:
          body_path: dist/RELEASE_NOTES.md
          files: ${{ steps.upload.outputs.release_files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
