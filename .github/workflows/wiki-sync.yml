name: Wiki Sync

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Sync docs/wiki to GitHub Wiki
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          wiki_url="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git"

          # Try to clone; if wiki doesn't exist yet, initialize it
          if ! git clone "${wiki_url}" "${tmpdir}/wiki" 2>/dev/null; then
            mkdir -p "${tmpdir}/wiki"
            git -C "${tmpdir}/wiki" init
            git -C "${tmpdir}/wiki" remote add origin "${wiki_url}"
          fi

          rsync -av --delete docs/wiki/ "${tmpdir}/wiki/"
          cd "${tmpdir}/wiki"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if ! git diff --cached --quiet || [ -z "$(git log --oneline 2>/dev/null)" ]; then
            git commit -m "Sync wiki from docs/wiki" || true
            git push origin HEAD:master
          fi
