name: "Documentation"
description: Report unclear, missing, or outdated docs
title: "[docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: issue
    attributes:
      label: Documentation issue
      description: What is unclear, wrong, or missing?
    validations:
      required: true

  - type: textarea
    id: links
    attributes:
      label: Affected files
      description: List relevant files (README, docs, wiki, ADRs).
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Optional replacement text or structure suggestion.
    validations:
      required: false
