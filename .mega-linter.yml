APPLY_FIXES: none
SHOW_ELAPSED_TIME: true
FILEIO_REPORTER: false
FLAVOR_SUGGESTIONS: false
PRINT_ALL_FILES: false

# Keep CI deterministic and strict on actionable linters.
ENABLE_LINTERS:
  - BASH_SHELLCHECK
  - MARKDOWN_MARKDOWNLINT
  - YAML_YAMLLINT
  - REPOSITORY_CHECKOV
  - REPOSITORY_DUSTILOCK
  - REPOSITORY_GIT_DIFF
  - REPOSITORY_KINGFISHER
  - REPOSITORY_SECRETLINT
  - REPOSITORY_SYFT
  - REPOSITORY_TRIVY
  - REPOSITORY_TRIVY_SBOM
  - REPOSITORY_TRUFFLEHOG

DISABLE_LINTERS:
  - REPOSITORY_DEVSKIM
  - REPOSITORY_GITLEAKS
  - REPOSITORY_KICS

FILTER_REGEX_EXCLUDE: >-
  (^|/)\.reference/|(^|/)megalinter-reports/|(^|/)\.cursor/
