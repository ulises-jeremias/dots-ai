# Package lists for install scripts. Named `package_groups` (not `groups`) so
# chezmoi's deep-merge with profiles.yaml does not replace this map — profiles
# defines `groups` as feature-group metadata (always_on, description, flags).
package_groups:
  core:
    - git
    - curl
    - wget
    - jq
    - ripgrep
    - fd
    - zsh
    - gh
  node:
    - fnm
    - nodejs
    - pnpm
  python:
    - python3
    - uv
    - pipx
  # Arch Linux uses different package names for some Python tools
  python_arch:
    - python
    - uv
    - python-pip
    - python-pipx
  docker:
    - docker
