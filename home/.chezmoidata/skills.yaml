# Default opt-in settings for external skills.
# These are the baseline defaults; users override them via chezmoi init prompts
# or by editing ~/.config/chezmoi/chezmoi.toml directly.
#
# All external skills are disabled by default — they are opt-in.
# Skills that require credentials or additional setup must be enabled explicitly.

external_skills:
  # JIRA Assistant Skills (14 skills) — requires JIRA credentials
  # Env: JIRA_API_TOKEN, JIRA_EMAIL, JIRA_SITE_URL
  jira_assistant: false
