ai:
  prompts_enabled: true
  skills_enabled: true
  templates_enabled: true
  default_assistant_template: AGENTS.md
mcp:
  enabled: true
  providers:
    - github
    - notion
    - slack
agents:
  clickup_cli: true    # ClickUp CLI — replaces ClickUp MCP (token-efficient)
  slack_cli: true      # Official Slack CLI for app development workflows
  rtk: true            # CLI output compression proxy (avg 89% token reduction)
  uipro_cli: true      # UI/UX Pro Max installer (used to sync upstream skill assets)
  claude_code: false   # Anthropic Claude Code terminal agent (opt-in)
  opencode: false      # OpenCode terminal agent (opt-in)
  pi: false            # pi coding agent by Mario Zechner (opt-in)
  copilot_cli: false   # GitHub Copilot CLI extension (opt-in, requires gh auth)
