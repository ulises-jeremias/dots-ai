<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7c948;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="subtleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#f7c948;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" ry="12" fill="url(#bgGradient)"/>

  <!-- Subtle glow effect -->
  <ellipse cx="400" cy="100" rx="350" ry="80" fill="url(#subtleGlow)"/>

  <!-- Accent line top -->
  <rect x="150" y="0" width="500" height="3" rx="1.5" fill="url(#accentGradient)"/>

  <!-- Robot/AI icon -->
  <text x="400" y="60" text-anchor="middle" font-size="36">🛠️</text>

  <!-- Title -->
  <text x="400" y="100" text-anchor="middle" fill="white" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="bold" letter-spacing="2">
    dots-ai
  </text>

  <!-- Subtitle -->
  <text x="400" y="130" text-anchor="middle" fill="#8b949e" font-family="'Segoe UI', Arial, sans-serif" font-size="16">
    AI-First Developer Workstation Baseline for dots-ai
  </text>

  <!-- Feature pills -->
  <rect x="100" y="150" width="100" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="150" y="166" text-anchor="middle" fill="#ff6b35" font-family="'Segoe UI', Arial, sans-serif" font-size="11">chezmoi</text>

  <rect x="215" y="150" width="80" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="255" y="166" text-anchor="middle" fill="#f7c948" font-family="'Segoe UI', Arial, sans-serif" font-size="11">skills</text>

  <rect x="310" y="150" width="80" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="350" y="166" text-anchor="middle" fill="#58a6ff" font-family="'Segoe UI', Arial, sans-serif" font-size="11">agents</text>

  <rect x="405" y="150" width="100" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="455" y="166" text-anchor="middle" fill="#7ee787" font-family="'Segoe UI', Arial, sans-serif" font-size="11">multi-tool</text>

  <rect x="520" y="150" width="80" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="560" y="166" text-anchor="middle" fill="#bc8cff" font-family="'Segoe UI', Arial, sans-serif" font-size="11">MCP</text>

  <rect x="615" y="150" width="90" height="24" rx="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="660" y="166" text-anchor="middle" fill="#f778ba" font-family="'Segoe UI', Arial, sans-serif" font-size="11">harness</text>

  <!-- Accent line bottom -->
  <rect x="150" y="197" width="500" height="3" rx="1.5" fill="url(#accentGradient)"/>
</svg>
